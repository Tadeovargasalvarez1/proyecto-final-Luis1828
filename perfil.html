<!DOCTYPE html>
<head>
    <title>CinePalace - Perfil</title>
    <link rel="stylesheet" href="perfil.css">
</head>

<body>

    <div class="contenedor">

        <header class="encabezado">

            <div>
                <h1>CinePalace</h1>
                <p>Mi perfil</p>
            </div>

            <button class="notificacion">
                <img src="notification.svg" alt="Notificaciones">
            </button>

        </header>

        <main>


            <section class="perfil">

                <div class="foto-contenedor">

                    <img class="foto" src="user.svg" alt="Foto de perfil">

                    <button class="editar">✎</button>

                </div>

                <h2>Usuario Premium</h2>
                <p>cinephile@example.com</p>

            </section>


            <section class="estadisticas">

                <article class="tarjeta-estadistica">

                    <h3>12</h3>
                    <p>Películas</p>

                </article>

                <article class="tarjeta-estadistica">

                    <img src="star.svg" alt="Nivel VIP">
                    <p>Nivel VIP</p>

                </article>

            </section>


            <section class="opciones">

                <button>

                    <span>
                        <img src="date.svg" alt="">
                        Mis reservas
                    </span>

                    <b>›</b>

                </button>

                <button>

                    <span>
                        <span class="engranaje">⚙</span>
                        Configuración
                    </span>

                    <b>›</b>

                </button>

            </section>


            <section class="elite">

                <div class="elite-titulo">

                    <h3>CinePalace Elite</h3>
                    <img src="star.svg" alt="Elite">

                </div>

                <p class="descripcion">
                    Disfruta de beneficios exclusivos y preventas.
                </p>

                <div class="barra">
                    <div class="progreso"></div>
                </div>

                <div class="datos-progreso">
                    <span>Próximo nivel</span>
                    <span>750 pts</span>
                </div>

            </section>


            <button class="cerrar-sesion">
                <span>↪</span>
                Cerrar sesión
            </button>

        </main>

        <footer>

            <div class="ayuda">
                <a href="#">¿Necesitas ayuda?</a>
            </div>

            <nav>

                <a href="#">

                    <img src="cartelera.svg" alt="Cartelera">
                    <span>Cartelera</span>

                </a>

                <a href="#">

                    <img src="search.svg" alt="Buscar">
                    <span>Buscar</span>

                </a>

                <a class="activo" href="#">

                    <img src="user.svg" alt="Perfil">
                    <span>Perfil</span>

                </a>

            </nav>

        </footer>

    </div>

</body>

</html>
