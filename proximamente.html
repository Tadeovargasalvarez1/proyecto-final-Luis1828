<!DOCTYPE html>
<html lang="es">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <title>CinePalace - Próximamente</title>

    <link rel="stylesheet" href="./proximamente.css?v=2">
</head>

<body>

    <div class="contenedor">

        <header>

            <div class="logo">
                <img src="./Logo.svg" alt="Logo de CinePalace">
                <h1>CinePalace</h1>
            </div>

            <button class="notificacion">
                <img src="./notification.svg" alt="Notificaciones">
            </button>

        </header>

        <main>

            <p class="subtitulo">PRÓXIMOS ESTRENOS</p>

            <nav class="categorias">
                <a href="#">Cartelera</a>
                <a href="#" class="activo">Próximamente</a>
            </nav>

            <section class="peliculas">

                <article class="pelicula">

                    <div class="imagen-pelicula">
                        <img src="./avatar.jpg" alt="Avatar 3">
                        <span>TBA</span>
                    </div>

                    <h2>Avatar 3</h2>
                    <p class="anio">2027</p>

                </article>

                <article class="pelicula">

                    <div class="imagen-pelicula">
                        <img src="./spiderman.jpg" alt="Spider-Man 4">
                        <span>TBA</span>
                    </div>

                    <h2>Spider-Man 4</h2>
                    <p class="anio">2027</p>

                </article>

                <article class="pelicula">

                    <div class="imagen-pelicula">
                        <img src="./superman.jpg" alt="Superman">
                        <span>JUN</span>
                    </div>

                    <h2>Superman</h2>
                    <p class="anio">2025</p>

                </article>

                <article class="pelicula">

                    <div class="imagen-pelicula">
                        <img src="./deadpool.jpeg" alt="Deadpool">
                        <span>PRE</span>
                    </div>

                    <h2>Deadpool</h2>
                    <p class="anio">2025</p>

                </article>

            </section>

            <section class="membresia">

                <p class="oferta">OFERTA EXCLUSIVA</p>

                <h2>
                    Membresía
                    <br>
                    Palace Gold
                </h2>

                <p class="descripcion-membresia">
                    Acceso anticipado a preventas, palomitas ilimitadas
                    y butacas VIP en cada función.
                </p>

                <button>Únete ahora</button>

                <img
                    class="imagen-palomitas"
                    src="./palomitas.jpg"
                    alt="Palomitas de CinePalace"
                >

            </section>

        </main>

        <footer>

            <nav>

                <a href="#" class="activo-footer">
                    <img src="./cartelera.svg" alt="Cartelera">
                    <span>Cartelera</span>
                </a>

                <a href="#">
                    <img src="./search.svg" alt="Buscar">
                    <span>Buscar</span>
                </a>

                <a href="#">
                    <img src="./user.svg" alt="Perfil">
                    <span>Perfil</span>
                </a>

            </nav>

        </footer>

    </div>

</body>

</html>
